[server]
listen_addr = "0.0.0.0"
port = 53
tcp_timeout = 10

#[server.tls]
#enabled = false
#port = 853
#cert_path = "/path/to/cert.pem"
#key_path = "/path/to/key.pem"

#[server.https]
#enabled = false
#port = 443
#cert_path = "/path/to/cert.pem"
#key_path = "/path/to/key.pem"

[middleware]
logging = true
metrics = false

[[plugins]]
kind = "nacos"
enabled = true
server_addr = "127.0.0.1:8848"
namespace = "public"
group = "DEFAULT_GROUP"
dns_zone = "nacos.local"
ttl = 6

[[plugins]]
kind = "system_dns"
enabled = true
cache_size = 256
min_ttl = 10
max_ttl = 300

[[plugins]]
kind = "forward"
enabled = true
upstream = ["8.8.8.8:53", "1.1.1.1:53"]
cache_size = 1024
min_ttl = 30
max_ttl = 600

[remote_config]
enabled = false
server_addr = "127.0.0.1:8848"
namespace = "public"
group = "DNS_FILTER_GROUP"
data_id = "dns-filter.toml"
